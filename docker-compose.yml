services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    environment:
      HOME: /home/node
      TERM: xterm-256color

      # Hardened system prompt (mounted file)
      SYSTEM_PROMPT_FILE: /home/node/.openclaw/system_prompt.txt

      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}

      # Python-runner wiring (authoritative)
      PYRUNNER_URL: http://python-runner:8000
      PYRUNNER_TOKEN: ${PYRUNNER_TOKEN}

      # Backward-compat (if any existing code still reads RUNNER_TOKEN)
      RUNNER_TOKEN: ${PYRUNNER_TOKEN}

    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace

      # Mount your host prompt file into the container (read-only)
      - ./config/system_prompt.txt:/home/node/.openclaw/system_prompt.txt:ro
    ports:
      - "127.0.0.1:18789:18789"
    init: true
    restart: unless-stopped
    depends_on:
      - python-runner
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-loopback}",
        "--port",
        "${OPENCLAW_GATEWAY_PORT:-18789}"
      ]

  openclaw-cli:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    environment:
      HOME: /home/node
      TERM: xterm-256color

      # Hardened system prompt (mounted file)
      SYSTEM_PROMPT_FILE: /home/node/.openclaw/system_prompt.txt

      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}

      # Optional: let CLI also call python-runner if your CLI path supports tools
      PYRUNNER_URL: http://python-runner:8000
      PYRUNNER_TOKEN: ${PYRUNNER_TOKEN}

      # Backward-compat
      RUNNER_TOKEN: ${PYRUNNER_TOKEN}

    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace

      # Mount your host prompt file into the container (read-only)
      - ./config/system_prompt.txt:/home/node/.openclaw/system_prompt.txt:ro
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]

  python-runner:
    build:
      context: .
      dockerfile: docker/python-runner.Dockerfile
    environment:
      # If your runner expects a specific env var name for auth, keep this too.
      RUNNER_TOKEN: ${PYRUNNER_TOKEN}
    volumes:
      # Make sure the runner sees the same workspace scripts
      - ${OPENCLAW_WORKSPACE_DIR}:/workspace
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped